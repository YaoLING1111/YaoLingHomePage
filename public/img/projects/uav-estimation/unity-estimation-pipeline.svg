<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Unity UAV Estimation Pipeline</title>
  <desc id="desc">A high-level pipeline diagram for automated Unity UAV simulation, sensor generation, estimator comparison, and metric analysis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef6fb"/>
      <stop offset="1" stop-color="#dfeaf7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#5c8fd6"/>
      <stop offset="1" stop-color="#54c2d2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#34506b" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="42" fill="url(#bg)"/>
  <circle cx="1010" cy="120" r="190" fill="#fff" opacity=".45"/>
  <circle cx="160" cy="650" r="230" fill="#78c7d7" opacity=".12"/>
  <text x="70" y="92" fill="#24364a" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">Automated UAV Localization Evaluation</text>
  <text x="72" y="130" fill="#66788a" font-family="Inter, Arial, sans-serif" font-size="18">Unity simulation + deterministic trajectory + estimator stress tests</text>
  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <g transform="translate(70 210)">
      <rect width="235" height="145" rx="26" fill="#ffffff" opacity=".88"/>
      <text x="28" y="48" fill="#5171a6" font-size="15" font-weight="800">01 · SIMULATION</text>
      <text x="28" y="84" fill="#203246" font-size="24" font-weight="800">Unity Drone</text>
      <text x="28" y="113" fill="#6f8194" font-size="16">Physics, map, obstacles</text>
    </g>
    <g transform="translate(355 210)">
      <rect width="235" height="145" rx="26" fill="#ffffff" opacity=".88"/>
      <text x="28" y="48" fill="#5171a6" font-size="15" font-weight="800">02 · CONTROL</text>
      <text x="28" y="84" fill="#203246" font-size="24" font-weight="800">Auto Agent</text>
      <text x="28" y="113" fill="#6f8194" font-size="16">Dijkstra + Bezier path</text>
    </g>
    <g transform="translate(640 210)">
      <rect width="235" height="145" rx="26" fill="#ffffff" opacity=".88"/>
      <text x="28" y="48" fill="#5171a6" font-size="15" font-weight="800">03 · SENSORS</text>
      <text x="28" y="84" fill="#203246" font-size="24" font-weight="800">Noisy Data</text>
      <text x="28" y="113" fill="#6f8194" font-size="16">GPS + ray-cast features</text>
    </g>
    <g transform="translate(925 210)">
      <rect width="205" height="145" rx="26" fill="#ffffff" opacity=".88"/>
      <text x="28" y="48" fill="#5171a6" font-size="15" font-weight="800">04 · EXPORT</text>
      <text x="28" y="84" fill="#203246" font-size="24" font-weight="800">CSV Logs</text>
      <text x="28" y="113" fill="#6f8194" font-size="16">50 Hz synchronized</text>
    </g>
  </g>
  <g stroke="url(#blue)" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M305 282H350"/>
    <path d="M590 282H635"/>
    <path d="M875 282H920"/>
  </g>
  <g transform="translate(90 465)" font-family="Inter, Arial, sans-serif">
    <rect width="1020" height="185" rx="30" fill="#ffffff" opacity=".72" filter="url(#shadow)"/>
    <text x="38" y="54" fill="#203246" font-size="24" font-weight="800">Estimator layer</text>
    <g transform="translate(40 86)">
      <rect width="210" height="64" rx="20" fill="#e9f0fb"/>
      <text x="34" y="40" fill="#315078" font-size="22" font-weight="800">EKF</text>
    </g>
    <g transform="translate(295 86)">
      <rect width="210" height="64" rx="20" fill="#e8f7f8"/>
      <text x="34" y="40" fill="#245b69" font-size="22" font-weight="800">PF / MCL</text>
    </g>
    <g transform="translate(550 86)">
      <rect width="210" height="64" rx="20" fill="#f1ecfb"/>
      <text x="34" y="40" fill="#4e457e" font-size="22" font-weight="800">Hybrid</text>
    </g>
    <g transform="translate(805 86)">
      <rect width="170" height="64" rx="20" fill="url(#blue)" opacity=".92"/>
      <text x="30" y="40" fill="#fff" font-size="22" font-weight="800">Metrics</text>
    </g>
  </g>
</svg>
